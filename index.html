<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON DUEL — 赛博朋克 TCG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg-void:#0a0a0f;--bg-panel:#111122;--bg-card:#14142a;--cyan:#00f0ff;--pink:#ff0080;--purple:#7b2ff7;--gold:#ffd700;--navy:#1a1a2e;--silver:#8899aa;--text:#c8d0d8;--text-dim:#5a6a7a;--glow-cyan:0 0 15px rgba(0,240,255,.4),0 0 40px rgba(0,240,255,.15);--glow-pink:0 0 15px rgba(255,0,128,.4),0 0 40px rgba(255,0,128,.15);--glow-purple:0 0 15px rgba(123,47,247,.4),0 0 40px rgba(123,47,247,.15);--glow-gold:0 0 15px rgba(255,215,0,.4),0 0 40px rgba(255,215,0,.15);--radius:10px;--card-w:200px}
html{font-size:16px}
body{font-family:Inter,sans-serif;background:var(--bg-void);color:var(--text);min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 20% 50%,rgba(0,240,255,.03) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(255,0,128,.03) 0%,transparent 60%)}
.header{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px) saturate(1.2);background:rgba(10,10,15,.85);border-bottom:1px solid rgba(0,240,255,.1);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px}
.header-logo{font-family:Orbitron,sans-serif;font-weight:900;font-size:1.4rem;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px;text-transform:uppercase}
.header-logo::after{content:"//";font-family:JetBrains Mono,monospace;-webkit-text-fill-color:var(--text-dim);font-size:.7rem;margin-left:8px}
.nav{display:flex;gap:4px}
.nav-btn{background:transparent;border:none;color:var(--text-dim);font-size:.85rem;font-weight:500;padding:8px 16px;border-radius:6px;cursor:pointer;transition:all .25s;position:relative}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-btn.active{color:var(--cyan)}
.nav-btn.active::after{content:"";position:absolute;bottom:-1px;left:16px;right:16px;height:2px;background:var(--cyan);box-shadow:var(--glow-cyan)}
.view{display:none;padding:24px;max-width:1200px;margin:0 auto}
.view.active{display:block}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-w),1fr));gap:20px;padding:4px}
.card{--rarity-color:var(--cyan);--rarity-glow:var(--glow-cyan);position:relative;width:100%;aspect-ratio:5/7;background:var(--bg-card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);cursor:pointer;overflow:hidden;transition:transform .3s,box-shadow .3s;display:flex;flex-direction:column;user-select:none}
.card[data-rarity="Rare"]{--rarity-color:var(--pink);--rarity-glow:var(--glow-pink)}
.card[data-rarity="Epic"]{--rarity-color:var(--purple);--rarity-glow:var(--glow-purple)}
.card[data-rarity="Legendary"]{--rarity-color:var(--gold);--rarity-glow:var(--glow-gold)}
.card::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,transparent 40%,rgba(0,240,255,.08) 45%,rgba(0,240,255,.15) 50%,rgba(0,240,255,.08) 55%,transparent 60%,transparent 100%);opacity:0;transition:opacity .4s;pointer-events:none;z-index:2}
.card:hover::before{opacity:1;animation:scan-line 1.2s ease-in-out infinite}
@keyframes scan-line{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
.card::after{content:"";position:absolute;inset:-1px;border-radius:calc(var(--radius)+1px);background:var(--rarity-color);opacity:0;transition:opacity .3s;z-index:-1;filter:blur(1px)}
.card:hover::after{opacity:.5;animation:glow-pulse 1.5s ease-in-out infinite}
@keyframes glow-pulse{0%,100%{opacity:.3}50%{opacity:.7}}
.card:hover{transform:translateY(-6px) scale(1.02);box-shadow:var(--rarity-glow);border-color:var(--rarity-color)}
.card-particle{position:absolute;width:3px;height:3px;border-radius:50%;pointer-events:none;z-index:3;animation:particle-float 1.2s ease-out forwards}
@keyframes particle-float{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
.card-badge{position:absolute;top:8px;right:8px;font-family:JetBrains Mono,monospace;font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:4px;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);border:1px solid var(--rarity-color);color:var(--rarity-color);z-index:5}
.card-art{flex:1;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 30%,rgba(0,240,255,.08) 0%,transparent 60%),radial-gradient(circle at 70% 70%,rgba(255,0,128,.05) 0%,transparent 60%);position:relative;overflow:hidden}
.card-art-icon{font-family:Orbitron,sans-serif;font-size:2.8rem;font-weight:900;color:var(--rarity-color);opacity:.3;text-shadow:0 0 30px var(--rarity-color)}
.card-art-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,240,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,.04) 1px,transparent 1px);background-size:20px 20px;opacity:0;transition:opacity .3s}
.card:hover .card-art-grid{opacity:1}
.card-body{padding:10px 12px 12px;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);position:relative;z-index:4}
.card-name{font-family:Orbitron,sans-serif;font-weight:700;font-size:.8rem;color:#e0e8f0;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-type{font-size:.65rem;color:var(--text-dim);margin-bottom:6px}
.card-stats{display:flex;gap:10px;font-family:JetBrains Mono,monospace;font-size:.7rem}
.card-stat{display:flex;align-items:center;gap:3px}
.card-stat .label{color:var(--text-dim);font-size:.6rem}
.card-stat .value{font-weight:600}
.card-stat .value.pink{color:var(--pink)}
.card-stat .value.cyan{color:var(--cyan)}
.battle-hud{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(0,0,0,.3);border:1px solid rgba(0,240,255,.1);border-radius:10px;margin-bottom:8px}
.battle-hud-hp{font-family:JetBrains Mono,monospace;font-size:1.6rem;font-weight:700}
.battle-zone{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:16px;position:relative}
.battle-zone-label{position:absolute;top:-10px;left:16px;font-family:Orbitron,sans-serif;font-size:.6rem;font-weight:600;color:var(--text-dim);background:var(--bg-void);padding:0 8px;text-transform:uppercase;letter-spacing:2px}
.battle-hand{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:8px 0}
.battle-hand .card{width:140px;aspect-ratio:5/7}
.battle-hand .card.playable{border-color:var(--cyan)}
.battle-hand .card.not-playable{opacity:.5;filter:grayscale(.5);cursor:not-allowed}
.battle-log{max-height:120px;overflow-y:auto;font-family:JetBrains Mono,monospace;font-size:.7rem;color:var(--text-dim);padding:8px 12px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.04);border-radius:8px;margin-top:8px}
.battle-start-btn{font-family:Orbitron,sans-serif;font-weight:700;font-size:.9rem;padding:14px 40px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--pink));color:#000;cursor:pointer;text-transform:uppercase;letter-spacing:2px}
.db-deck-card{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;cursor:pointer;transition:all .2s}
.db-deck-card:hover{background:rgba(255,0,128,.08);border-color:var(--pink)}
.dcc-color{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.dcc-name{font-family:Orbitron,sans-serif;font-size:.75rem;font-weight:600}
.dcc-cost{font-family:JetBrains Mono,monospace;font-size:.65rem;color:var(--cyan)}
.dcc-remove{font-family:JetBrains Mono,monospace;font-size:.7rem;color:var(--pink);opacity:.5}
.db-deck-card:hover .dcc-remove{opacity:1}
.filter-btn{background:transparent;border:1px solid var(--navy);color:var(--text-dim);font-size:.78rem;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:var(--purple);color:var(--text)}
.filter-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
@media(max-width:768px){.header{padding:0 12px;height:56px}.header-logo{font-size:1.1rem}.header-logo::after{display:none}.nav-btn{padding:6px 10px;font-size:.78rem}.view{padding:12px}.card-grid{gap:12px}:root{--card-w:140px}.battle-hand .card{width:110px}.battle-hud-hp{font-size:1.2rem}}
@media(max-width:480px){.card-grid{grid-template-columns:repeat(2,1fr)}.battle-hand .card{width:90px}}
@media(prefers-reduced-motion:reduce){.card::before{display:none}.card:hover{transform:none}*{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
.card-enter{animation:cardIn .45s ease forwards;opacity:0}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.88);filter:blur(4px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
.card-exit{animation:cardOut .35s ease forwards;pointer-events:none}
@keyframes cardOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-20px) scale(.9)}}
.card-holo{position:absolute;inset:0;background:linear-gradient(135deg,transparent 25%,rgba(255,255,255,.06) 35%,rgba(255,255,255,.12) 50%,rgba(255,255,255,.06) 65%,transparent 75%);background-size:250% 250%;opacity:0;transition:opacity .3s;pointer-events:none;z-index:3;mix-blend-mode:overlay}
.card:hover .card-holo{opacity:1;animation:holoShimmer 2s ease-in-out infinite}
@keyframes holoShimmer{0%{background-position:250% 0%}100%{background-position:-250% 0%}}
.card-rarity{position:absolute;bottom:5px;right:7px;font-size:.45rem;letter-spacing:2px;color:var(--rarity-color);text-shadow:0 0 6px var(--rarity-color);z-index:5;font-family:JetBrains Mono,monospace}
.card-border-glow{position:absolute;inset:-2px;border-radius:12px;background:linear-gradient(135deg,transparent 40%,var(--rarity-color) 50%,transparent 60%);opacity:0;transition:opacity .3s;z-index:-2;filter:blur(2px);background-size:200% 200%}
.card:hover .card-border-glow{opacity:.6;animation:borderShimmer 2s ease-in-out infinite}
@keyframes borderShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.card-divider{height:1px;background:linear-gradient(90deg,transparent 0%,var(--rarity-color) 50%,transparent 100%);opacity:.3;margin:4px 0 6px}
.card.dragging{opacity:.4;transform:scale(.92);cursor:grabbing}
.card.drag-target{border-color:var(--cyan)!important;box-shadow:var(--glow-cyan)!important;transform:translateY(-4px) scale(1.02)}
.card .card-body{padding:8px 10px 10px}
.card .card-name{font-size:.72rem;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.card .card-name .cost-badge{font-family:JetBrains Mono,monospace;font-size:.6rem;color:var(--rarity-color);border:1px solid var(--rarity-color);border-radius:4px;padding:1px 5px;background:rgba(0,0,0,.4)}
.card .card-desc{font-size:.55rem;color:var(--text-dim);line-height:1.3;margin:3px 0;max-height:2.4em;overflow:hidden}
/* === HEARTHSTONE-STYLE BATTLE === */
.battle-board{display:flex;flex-direction:column;gap:2px;flex:1;align-items:center}
.battle-board .zone{width:100%;padding:4px 8px;border:1px solid rgba(255,255,255,.04);border-radius:8px;background:rgba(255,255,255,.015);position:relative;min-height:100px}
.battle-board .zone-label{position:absolute;top:-9px;left:12px;font-family:Orbitron,sans-serif;font-size:.55rem;color:var(--text-dim);background:var(--bg-void);padding:0 6px;letter-spacing:1px;text-transform:uppercase}
.minion-row{display:flex;gap:8px;justify-content:center;min-height:95px;align-items:center;flex-wrap:wrap}
.minion-card{position:relative;width:90px;height:90px;background:var(--bg-card);border:2px solid var(--rarity-color,var(--cyan));border-radius:6px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.minion-card .mc-name{font-family:Orbitron,sans-serif;font-size:.45rem;color:#e0e8f0;text-align:center;max-width:80%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.minion-card .mc-icon{font-size:1.2rem;opacity:.5;margin:2px 0}
.minion-card .mc-stats{display:flex;justify-content:space-between;width:100%;padding:0 6px;position:absolute;bottom:4px}
.minion-card .mc-atk{font-family:JetBrains Mono,monospace;font-size:.7rem;font-weight:700;color:var(--pink)}
.minion-card .mc-hp{font-family:JetBrains Mono,monospace;font-size:.7rem;font-weight:700;color:var(--cyan)}
.minion-card.highlight-attacker{transform:scale(1.08);box-shadow:0 0 15px var(--pink);border-color:var(--pink);z-index:5}
.minion-card.highlight-target{transform:scale(1.05);box-shadow:0 0 15px var(--cyan);border-color:var(--cyan);cursor:crosshair;z-index:5}
.minion-card .mc-dmg{position:absolute;font-family:JetBrains Mono,monospace;font-size:1rem;font-weight:700;color:var(--pink);text-shadow:0 0 10px var(--pink);pointer-events:none;animation:dmgFloat .8s ease-out forwards;z-index:10}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-30px) scale(.8)}}
.minion-card.dying{animation:dieAnim .4s ease forwards;pointer-events:none}
@keyframes dieAnim{0%{opacity:1;transform:scale(1)}50%{transform:scale(1.2);opacity:.5}100%{opacity:0;transform:scale(0)}}
.minion-card.attacking{animation:atkAnim .35s ease}
@keyframes atkAnim{0%{transform:translateX(0)}30%{transform:translateX(30px) scale(1.1)}100%{transform:translateX(0)}}
.minion-card.enemy-attacking{animation:eAtkAnim .35s ease}
@keyframes eAtkAnim{0%{transform:translateX(0)}30%{transform:translateX(-30px) scale(1.1)}100%{transform:translateX(0)}}
.hand-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:4px 0;min-height:50px}
.hand-row .mini-card{width:70px;height:80px;background:var(--bg-card);border:1px solid var(--rarity-color,var(--cyan));border-radius:5px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding:2px}
.hand-row .mini-card:hover{transform:translateY(-6px);box-shadow:0 0 12px var(--rarity-color,var(--cyan))}
.hand-row .mini-card .mc-name{font-family:Orbitron,sans-serif;font-size:.38rem;color:#e0e8f0;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:95%}
.hand-row .mini-card .mc-cost{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--cyan);color:#000;font-family:JetBrains Mono,monospace;font-size:.5rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.hand-row .mini-card .mc-stats{display:flex;gap:6px;margin-top:2px}
.hand-row .mini-card .mc-atk{font-family:JetBrains Mono,monospace;font-size:.55rem;font-weight:700;color:var(--pink);background:rgba(255,0,128,.15);padding:0 4px;border-radius:3px}
.hand-row .mini-card .mc-hp{font-family:JetBrains Mono,monospace;font-size:.55rem;font-weight:700;color:var(--cyan);background:rgba(0,240,255,.15);padding:0 4px;border-radius:3px}
.card-placeholder{width:70px;min-width:70px;height:90px;border:1px dashed var(--navy);border-radius:5px}
.hp-float{position:fixed;font-family:JetBrains Mono,monospace;font-size:1.8rem;font-weight:900;pointer-events:none;z-index:100;animation:hpFloat 1s ease-out forwards}
@keyframes hpFloat{0%{opacity:1;transform:scale(1.5) translateY(0)}100%{opacity:0;transform:scale(1) translateY(-40px)}}
.hero-avatar{width:60px;height:60px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:Orbitron,sans-serif;font-size:.7rem;font-weight:900;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.hero-avatar.cyan{border-color:var(--cyan);color:var(--cyan)}
.hero-avatar.pink{border-color:var(--pink);color:var(--pink)}
.mana-crystal{width:18px;height:18px;border-radius:50%;display:inline-block;margin:0 1px;border:1px solid var(--cyan)}
.mana-crystal.full{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.mana-crystal.empty{background:transparent}
.target-hint{font-family:JetBrains Mono,monospace;font-size:.65rem;color:var(--pink);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.5}}
</style>
</head>
<body>
<header class="header">
<div class="header-logo">Neon Duel</div>
<nav class="nav">
<button class="nav-btn active" data-view="collection">集卡册</button>
<button class="nav-btn" data-view="deckbuilder">组卡器</button>
<button class="nav-btn" data-view="battle">对战</button>
</nav>
<div class="header-stats" style="font-family:JetBrains Mono,monospace;font-size:.75rem;color:var(--text-dim);display:flex;gap:12px">
<span><span class="dot-cyan"></span> <span id="total-cards">0</span></span>
<span><span class="dot-pink"></span> <span id="deck-count-hdr">0</span></span></div>
</header>
<section class="view active" id="view-collection">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
<h2 style="font-family:Orbitron,sans-serif;font-weight:600;font-size:1.1rem;color:var(--cyan)">// 卡牌图鉴</h2>
<div id="filters" class="filters" style="display:flex;gap:8px;flex-wrap:wrap">
<button class="filter-btn active" data-filter="all">全部</button>
<button class="filter-btn" data-filter="ICE">ICE</button>
<button class="filter-btn" data-filter="Daemon">Daemon</button>
<button class="filter-btn" data-filter="Cyberware">义体</button>
<button class="filter-btn" data-filter="Hardware">硬件</button>
<button class="filter-btn" data-filter="Hack">入侵</button></div></div>
<div class="card-grid" id="collection-grid"></div></section>
<section class="view" id="view-deckbuilder">
<div style="display:grid;grid-template-columns:1fr 300px;gap:24px;min-height:calc(100vh - 140px)">
<div><h3 style="font-family:Orbitron,sans-serif;font-weight:600;font-size:.9rem;color:var(--cyan);margin-bottom:16px">// 卡牌池 <span style="font-weight:400;font-size:.75rem;color:var(--text-dim)">点击卡牌加入牌组</span></h3>
<div class="card-grid" id="db-pool-grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px"></div></div>
<div><h3 style="font-family:Orbitron,sans-serif;font-weight:600;font-size:.9rem;color:var(--cyan);margin-bottom:16px">// 当前牌组 <span id="deck-count" style="color:var(--pink);font-weight:400;font-size:.75rem">0/10</span></h3>
<div id="deck-list"><div class="db-empty" style="text-align:center;padding:40px 20px;color:var(--text-dim);font-size:.85rem;border:1px dashed var(--navy);border-radius:8px">点击左侧卡牌组建你的牌组<br>上限10张</div></div></div></div></section>
<section class="view" <section class="view" id="view-battle">
<div id="battle-start-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px;min-height:calc(100vh - 140px)">
<h2 style="font-family:Orbitron,sans-serif;font-weight:700;font-size:1.4rem;color:var(--text-dim)">// 准备接入</h2>
<p style="color:var(--text-dim);max-width:400px;text-align:center;font-size:.85rem">需要至少5张卡牌才能开始对战。在「组卡器」中选好卡牌后回到这里。</p>
<button class="battle-start-btn" id="battle-start-btn" style="font-family:Orbitron,sans-serif;font-weight:700;font-size:.9rem;padding:14px 40px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--pink));color:#000;cursor:pointer;text-transform:uppercase;letter-spacing:2px">开始对战<span style="display:block;font-size:.6rem;opacity:.7;margin-top:4px;font-weight:400;letter-spacing:0;text-transform:none">对手: AI · 炉石风格 · 回合制</span></button></div>
<div class="battle-field" id="battle-field" style="display:none;flex:1;flex-direction:column;gap:4px;padding:8px 8px 12px">

<!-- HUD -->
<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(0,0,0,.3);border:1px solid rgba(0,240,255,.1);border-radius:8px;margin-bottom:4px">
<div style="display:flex;align-items:center;gap:6px">
<div class="hero-avatar cyan" id="p-avatar">☆</div>
<div><div id="p-hp" style="font-family:JetBrains Mono,monospace;font-size:1.2rem;font-weight:700;color:var(--cyan)">30</div>
<div id="p-mana" style="font-family:JetBrains Mono,monospace;font-size:.6rem;color:var(--cyan)" class="mana-row"></div></div></div>
<div style="text-align:center">
<div id="battle-turn" style="font-family:Orbitron,sans-serif;font-size:.65rem;color:var(--text-dim)">回合 1</div>
<div id="battle-status" style="font-family:JetBrains Mono,monospace;font-size:.65rem;color:var(--text);margin-top:2px;min-height:1em">你的回合 — 出牌或攻击</div></div>
<div style="text-align:right;display:flex;align-items:center;gap:6px">
<div><div id="a-hp" style="font-family:JetBrains Mono,monospace;font-size:1.2rem;font-weight:700;color:var(--pink)">30</div>
<div id="a-mana" style="font-family:JetBrains Mono,monospace;font-size:.6rem;color:var(--pink)" class="mana-row"></div></div>
<div class="hero-avatar pink" id="a-avatar">★</div></div></div>

<!-- Battle Board -->
<div class="battle-board">
<!-- Opponent Hand -->
<div class="zone" style="min-height:56px"><span class="zone-label">// 对手手牌</span>
<div class="hand-row" id="a-hand"></div></div>
<!-- Opponent Minions -->
<div class="zone" style="min-height:105px"><span class="zone-label">// 对手随从</span>
<div class="minion-row" id="a-board"></div></div>
<!-- Divider -->
<div style="height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.2;margin:2px 0"></div>
<!-- Player Minions -->
<div class="zone" style="min-height:105px"><span class="zone-label">// 你的随从</span>
<div class="minion-row" id="p-board"></div></div>
<!-- Player Hand -->
<div class="zone" style="min-height:90px"><span class="zone-label">// 你的手牌</span>
<div class="hand-row" id="p-hand"></div></div></div>

<!-- Actions -->
<div style="display:flex;gap:6px;justify-content:center;padding:6px 0">
<div id="target-hint" class="target-hint" style="display:none;font-family:JetBrains Mono,monospace;font-size:.7rem;color:var(--pink);animation:pulse 1s infinite">▶ 选择攻击目标 (敌方随从或英雄)</div>
<button id="end-turn-btn" style="background:var(--cyan);color:#000;font-family:Orbitron,sans-serif;font-weight:600;font-size:.7rem;padding:8px 20px;border:none;border-radius:6px;cursor:pointer;letter-spacing:1px">结束回合</button>
<button id="restart-btn" style="background:transparent;border:1px solid var(--text-dim);color:var(--text-dim);font-family:Orbitron,sans-serif;font-weight:600;font-size:.7rem;padding:8px 20px;border-radius:6px;cursor:pointer;letter-spacing:1px">弃权重开</button></div>

<div class="battle-log" id="battle-log" style="max-height:70px;overflow-y:auto;font-family:JetBrains Mono,monospace;font-size:.6rem;color:var(--text-dim);padding:4px 8px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.04);border-radius:6px"><div class="log-entry">// 战斗日志初始化...</div></div></div></section><div id="victory-modal" style="display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px)">
<div style="background:var(--bg-panel);border:1px solid var(--cyan);border-radius:16px;padding:40px 48px;text-align:center">
<h2 style="font-family:Orbitron,sans-serif;font-weight:900;font-size:1.6rem;color:var(--cyan);margin-bottom:8px">// 入侵成功</h2>
<p style="color:var(--text-dim);margin-bottom:24px">敌方系统已被攻破。数据已提取。</p>
<button onclick="resetBattle()" style="font-family:Orbitron,sans-serif;font-weight:600;font-size:.8rem;padding:12px 32px;border:none;border-radius:6px;cursor:pointer;background:var(--cyan);color:#000">再来一局</button></div></div>
<div id="defeat-modal" style="display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px)">
<div style="background:var(--bg-panel);border:1px solid var(--pink);border-radius:16px;padding:40px 48px;text-align:center">
<h2 style="font-family:Orbitron,sans-serif;font-weight:900;font-size:1.6rem;color:var(--pink);margin-bottom:8px">// 连接断开</h2>
<p style="color:var(--text-dim);margin-bottom:24px">你的系统已被反制。重新配置后重试。</p>
<button onclick="resetBattle()" style="font-family:Orbitron,sans-serif;font-weight:600;font-size:.8rem;padding:12px 32px;border:1px solid var(--pink);border-radius:6px;cursor:pointer;background:transparent;color:var(--pink)">重新连接</button></div></div><script>
const C=[
{id:1,name:'ICE WALL',type:'ICE',rarity:'Common',cost:2,p:0,d:4,icon:'\u258c',atk:0,hp:1,desc:'部署一道标准防火墙。'},
{id:2,name:'DATA LEECH',type:'Daemon',rarity:'Common',cost:1,p:2,d:0,icon:'\u224b',atk:2,hp:2,desc:'从对手系统盗取数据。'},
{id:3,name:'CYBER CLAW',type:'Cyberware',rarity:'Common',cost:2,p:3,d:0,icon:'\u2694',atk:3,hp:3,desc:'手臂集成破解用爪刃。'},
{id:4,name:'SPINE COOLER',type:'Cyberware',rarity:'Common',cost:1,p:0,d:2,icon:'\u2744',atk:0,hp:4,desc:'散热植入体，降低系统过载。'},
{id:5,name:'CODE WORM',type:'Daemon',rarity:'Common',cost:2,p:3,d:0,icon:'\u2248',atk:3,hp:5,desc:'腐蚀敵方数据结构。'},
{id:6,name:'FRAG GRENADE',type:'Hardware',rarity:'Common',cost:2,p:4,d:0,icon:'💥',atk:4,hp:6,desc:'区域性压制爆炸物。'},
{id:7,name:'BEACON JAMMER',type:'Hardware',rarity:'Common',cost:1,p:1,d:1,icon:'\u2573',atk:1,hp:7,desc:'扰乱敵方通信信标。'},
{id:8,name:'SMOKE PROXY',type:'Daemon',rarity:'Common',cost:1,p:0,d:3,icon:'\u25ce',atk:0,hp:8,desc:'代理数据包混淆追踪。'},
{id:9,name:'NEURAL OVERRIDE',type:'Hack',rarity:'Rare',cost:3,p:5,d:0,icon:'\u25c8',atk:5,hp:9,desc:'夺取敵方一道ICE的控制权。'},
{id:10,name:'BLACK ICE',type:'ICE',rarity:'Rare',cost:4,p:6,d:0,icon:'\u25c6',atk:6,hp:10,desc:'致命反击程序，造成大量伤害。'},
{id:11,name:'EMP BURST',type:'Hardware',rarity:'Rare',cost:3,p:4,d:0,icon:'\u26a1',atk:4,hp:11,desc:'瘱痪敵方全体义体两回合。'},
{id:12,name:'VIRAL CASCADE',type:'Daemon',rarity:'Rare',cost:4,p:6,d:0,icon:'\u25c9',atk:6,hp:12,desc:'链式数据破坏，传染相邻节点。'},
{id:13,name:'GHOST PROTOCOL',type:'Hack',rarity:'Epic',cost:5,p:0,d:0,icon:'\u25d0',atk:0,hp:13,desc:'进入隐身，下一张卡伤害翻倍。'},
{id:14,name:'QUANTUM ENGINE',type:'Hardware',rarity:'Epic',cost:6,p:8,d:0,icon:'\u25c8',atk:8,hp:14,desc:'原型量子处理器，威力惊人。'},
{id:15,name:'SHADOW ICE',type:'ICE',rarity:'Epic',cost:5,p:0,d:8,icon:'\u25c8',atk:0,hp:15,desc:'自适应伪装防火墙，极难穿透。'},
{id:16,name:'PHOENIX PROTOCOL',type:'Hack',rarity:'Legendary',cost:7,p:10,d:0,icon:'\u25c6',atk:10,hp:16,desc:'从备份中重生，毁灭性反击。'}];
const CC={Common:'#00f0ff',Rare:'#ff0080',Epic:'#7b2ff7',Legendary:'#ffd700'};
const MX=10,HP=30;
let dk=[],bt=null;

function ch(c,e){
const cl=CC[c.rarity];
return '<div class="card" data-id="'+c.id+'" data-rarity="'+c.rarity+'" '+e+'>'+
'<span class="card-badge">'+c.rarity.toUpperCase()+'</span>'+
'<div class="card-art"><div class="card-art-grid"></div>'+
genArt(c,cl)+'</div>'+
'<div class="card-body"><div class="card-name">'+c.name+'</div>'+
'<div class="card-type">'+c.type+' \u26a1'+c.cost+'</div>'+
'<div class="card-stats">'+
(c.p>0?'<span class="card-stat"><span class="label">ATK</span> <span class="value pink">'+c.p+'</span></span>':'')+
(c.d>0?'<span class="card-stat"><span class="label">DEF</span> <span class="value cyan">'+c.d+'</span></span>':'')+
(c.p===0&&c.d===0?'<span class="card-stat"><span class="label" style="color:var(--purple)">SPL</span></span>':'')+
'</div></div></div>';}

function rC(f){
const g=document.getElementById('collection-grid');
const fl=f==='all'?C:C.filter(x=>x.type===f);
g.innerHTML=fl.map(x=>ch(x,'')).join('');
g.querySelectorAll('.card').forEach(e=>sFX(e));}

function rP(){
const g=document.getElementById('db-pool-grid');
g.innerHTML=C.map(c=>{
const n=dk.filter(x=>x.id===c.id).length;
const cl=n>=2?'in-deck':'';
const bg=n>0?'<span class="deck-count">'+n+'</span>':'';
return '<div class="card '+cl+'" data-id="'+c.id+'">'+bg+
'<span class="card-badge">'+c.rarity.toUpperCase()+'</span>'+
'<div class="card-art"><div class="card-art-grid"></div>'+
genArt(c,CC[c.rarity])+'</div>'+
'<div class="card-body"><div class="card-name">'+c.name+'</div>'+
'<div class="card-type">'+c.type+' \u26a1'+c.cost+'</div>'+
'<div class="card-stats">'+
(c.p>0?'<span class="card-stat"><span class="label">ATK</span> <span class="value pink">'+c.p+'</span></span>':'')+
(c.d>0?'<span class="card-stat"><span class="label">DEF</span> <span class="value cyan">'+c.d+'</span></span>':'')+
(c.p===0&&c.d===0?'<span class="card-stat"><span class="label" style="color:var(--purple)">SPL</span></span>':'')+
'</div></div></div>';}).join('');
g.querySelectorAll('.card:not(.in-deck)').forEach(e=>{
e.addEventListener('click',()=>aD(parseInt(e.dataset.id)));sFX(e);});}

function rL(){
const el=document.getElementById('deck-list');
document.getElementById('deck-count').textContent=dk.length+'/'+MX;
if(dk.length===0){el.innerHTML='<div class="db-empty" style="text-align:center;padding:40px 20px;color:var(--text-dim);font-size:.85rem;border:1px dashed var(--navy);border-radius:8px">点击左侧卡牌组建你的牌组<br>上限10张</div>';return;}
el.innerHTML=dk.map((x,i)=>{
return '<div class="db-deck-card" data-idx="'+i+'"><div class="dcc-color" style="background:'+CC[x.rarity]+'"></div>'+
'<div class="dcc-info"><div class="dcc-name" style="color:'+CC[x.rarity]+'">'+x.name+'</div>'+
'<div class="dcc-cost">'+x.type+' \u26a1'+x.cost+'</div></div><span class="dcc-remove">\u2715</span></div>';}).join('');
el.querySelectorAll('.db-deck-card').forEach(e=>{
e.addEventListener('click',function(){dk.splice(parseInt(this.dataset.idx),1);rP();rL();uH();});});}

function aD(id){
if(dk.length>=MX)return;
if(dk.filter(x=>x.id===id).length>=2)return;
const c=C.find(x=>x.id===id);if(!c)return;
dk.push(c);rP();rL();uH();}

function uH(){document.getElementById('total-cards').textContent=C.length;document.getElementById('deck-count-hdr').textContent=dk.length;}

function sFX(el){
el.addEventListener('mouseenter',function(){
if(window.matchMedia('(prefers-reduced-motion:reduce)').matches)return;
for(let i=0;i<6;i++){
const p=document.createElement('div');p.className='card-particle';
const a=(i/6)*Math.PI*2,dist=40+Math.random()*30;
const col=getComputedStyle(this).getPropertyValue('--rarity-color').trim()||'var(--cyan)';
p.style.cssText='left:'+(50+Math.random()*20-10)+'%;top:'+(50+Math.random()*20-10)+'%;background:'+col+';--dx:'+(Math.cos(a)*dist)+'px;--dy:'+(-Math.abs(Math.sin(a)*dist))+'px;animation-duration:'+(.8+Math.random()*.6)+'s';
this.appendChild(p);setTimeout(()=>p.remove(),1400);}});}

document.querySelectorAll('.nav-btn').forEach(b=>{
b.addEventListener('click',function(){
document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
this.classList.add('active');
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.getElementById('view-'+this.dataset.view).classList.add('active');});});

document.getElementById('filters').addEventListener('click',function(e){
if(!e.target.classList.contains('filter-btn'))return;
document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
e.target.classList.add('active');rCAnim(e.target.dataset.filter);});

function sh(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}


// ===== HEARTHSTONE-STYLE BATTLE =====
const MX=10,HP=30,MB=3;
let bt=null,selAtk=-1;

function manaHTML(n,mx){
  var h="";
  for(var i=1;i<=mx;i++){h+='<span class="mana-crystal '+(i<=n?"full":"empty")+'"></span>';}
  return h;
}

function sB(){
  if(dk.length<5){lg("牌组不足5张","");return;}
  selAtk=-1;
  const pD=sh([...dk]),aD=sh([...dk]);
  bt={t:1,p:{hp:HP,en:1,me:1,dk:pD,hd:[],bd:[]},a:{hp:HP,en:0,me:0,dk:aD,hd:[],bd:[]},end:0};
  for(let i=0;i<3;i++){dw("p");dw("a");}
  document.getElementById("battle-start-screen").style.display="none";
  document.getElementById("battle-field").style.display="flex";
  uB();lg("// 战斗开始! 你的回合","");
}

function dw(s){
  const st=bt[s];
  if(st.dk.length===0||st.hd.length>=6)return;
  st.hd.push(st.dk.pop());
}

function lg(m,c){
  const e=document.getElementById("battle-log");
  e.innerHTML+='<div class="log-entry '+c+'">'+m+'</div>';
  e.scrollTop=e.scrollHeight;
}

function uB(){
  const s=bt;
  document.getElementById("p-hp").textContent=s.p.hp;
  document.getElementById("a-hp").textContent=Math.max(0,s.a.hp);
  document.getElementById("p-mana").innerHTML=manaHTML(s.p.en,s.p.me);
  document.getElementById("a-mana").innerHTML=manaHTML(s.a.en,s.a.me);
  document.getElementById("battle-turn").textContent="\u56de\u5408 "+s.t;

  // Player hand
  const ph=document.getElementById("p-hand");
  ph.innerHTML=s.p.hd.map((c,i)=>{
    var cl=CC[c.rarity];
    var canPlay=!s.end && c.cost<=s.p.en && s.p.bd.length<MB && c.atk!==undefined;
    var cls=canPlay?"":";opacity:.5;filter:grayscale(.5);cursor:not-allowed";
    return '<div class="mini-card '+(canPlay?"playable":"")+'" data-idx="'+i+'" data-side="p" data-type="hand" data-cost="'+c.cost+'" style="--rarity-color:'+cl+cls+'">'+
      '<span class="mc-cost">'+c.cost+'</span>'+
      '<span class="mc-name">'+c.name+'</span>'+
      '<div class="mc-stats"><span class="mc-atk">'+(c.atk||0)+'</span><span class="mc-hp">'+(c.hp||0)+'</span></div></div>';
  }).join("");
  ph.querySelectorAll(".mini-card.playable").forEach(el=>{
    el.addEventListener("click",()=>slm(parseInt(el.dataset.idx)));
  });

  // Player board
  const pb=document.getElementById("p-board");
  pb.innerHTML=s.p.bd.map((c,i)=>{
    var cl=CC[c.rarity];
    var canAtk=c.atk>0 && !s.end;
    return '<div class="minion-card" data-idx="'+i+'" data-side="p" data-type="board" style="--rarity-color:'+cl+'">'+
      '<span class="mc-icon">'+c.icon+'</span>'+
      '<span class="mc-name">'+c.name+'</span>'+
      '<div class="mc-stats"><span class="mc-atk">'+c.atk+'</span><span class="mc-hp">'+c.hp_cur+'/'+c.hp_max+'</span></div></div>';
  }).join("");
  for(var i=s.p.bd.length;i<MB;i++){pb.innerHTML+='<div class="card-placeholder"></div>';}
  pb.querySelectorAll(".minion-card").forEach(el=>{
    el.addEventListener("click",()=>slAtk(parseInt(el.dataset.idx)));
  });

  // Opponent board
  const ab=document.getElementById("a-board");
  ab.innerHTML=s.a.bd.map((c,i)=>{
    var cl=CC[c.rarity];
    return '<div class="minion-card enemy" data-idx="'+i+'" data-side="e" data-type="board" style="--rarity-color:'+cl+'">'+
      '<span class="mc-icon">'+c.icon+'</span>'+
      '<span class="mc-name">'+c.name+'</span>'+
      '<div class="mc-stats"><span class="mc-atk">'+c.atk+'</span><span class="mc-hp">'+c.hp_cur+'/'+c.hp_max+'</span></div></div>';
  }).join("");
  for(var i=s.a.bd.length;i<MB;i++){ab.innerHTML+='<div class="card-placeholder"></div>';}
  ab.querySelectorAll(".minion-card").forEach(el=>{
    el.addEventListener("click",()=>{if(selAtk>=0)doAtk("board",parseInt(el.dataset.idx));});
  });

  // Opponent hand (face down)
  const ah=document.getElementById("a-hand");
  ah.innerHTML=s.a.hd.map(()=>'<div class="mini-card" style="cursor:default;background:linear-gradient(135deg,#1a1a2e,#0a0a0f);border-color:rgba(255,0,128,.2);opacity:.6">'+
    '<span class="mc-name" style="color:var(--text-dim)">??</span>'+
    '<div class="mc-stats"><span class="mc-atk" style="background:rgba(255,0,128,.08)">?<'+'/span><span class="mc-hp" style="background:rgba(0,240,255,.08)">?</span></div></div>').join("");

  // Status
  var stMsg=bt.end?"":(selAtk>=0?"\u25b6 \u9009\u62e9\u653b\u51fb\u76ee\u6807":"\u4f60\u7684\u56de\u5408 \u2014 \u51fa\u724c\u6216\u653b\u51fb");
  document.getElementById("battle-status").textContent=stMsg;
  document.getElementById("target-hint").style.display=selAtk>=0?"block":"none";
  document.getElementById("end-turn-btn").disabled=bt.end;
}

function slm(idx){
  const s=bt;if(s.end)return;
  const c=s.p.hd[idx];if(!c||c.cost>s.p.en||s.p.bd.length>=MB)return;
  s.p.en-=c.cost;
  s.p.hd.splice(idx,1);
  c.hp_cur=c.hp||1;
  c.hp_max=c.hp||1;
  s.p.bd.push(c);
  lg("\u2728 "+c.name+" \u53ec\u5524\u5951\u7ea6","special");
  uB();
}

function slAtk(idx){
  const s=bt;if(s.end)return;
  const c=s.p.bd[idx];if(!c||c.atk<=0)return;
  selAtk=idx;
  document.querySelectorAll("#p-board .minion-card").forEach((el,i)=>{
    el.classList.toggle("highlight-attacker",i===idx);
  });
  document.querySelectorAll("#a-board .minion-card,#a-avatar").forEach(el=>{
    el.classList.add("highlight-target");
  });
  document.getElementById("target-hint").style.display="block";
}

function doAtk(tType,tIdx){
  const s=bt;if(s.end||selAtk<0)return;
  const atkr=s.p.bd[selAtk];
  if(!atkr)return;
  var def;
  if(tType==="board"&&s.a.bd[tIdx]){
    def=s.a.bd[tIdx];
    s.a.bd[tIdx].hp_cur-=atkr.atk;
    if(atkr.hp_cur>0&&def.atk>0){atkr.hp_cur-=def.atk;}
    lg("\u2694 "+atkr.name+" \u653b\u51fb "+def.name,"damage");
    // Show damage numbers
    showDmg("a-board",tIdx,"-"+atkr.atk);
    if(def.atk>0)showDmg("p-board",selAtk,"-"+def.atk);
    // Death check
    if(s.a.bd[tIdx].hp_cur<=0){s.a.bd.splice(tIdx,1);}
    if(atkr.hp_cur<=0){s.p.bd.splice(selAtk,1);}
  }else if(tType==="hero"){
    s.a.hp-=atkr.atk;
    lg("\u2694 "+atkr.name+" \u653b\u51fb\u82f1\u96c4!","damage");
    showDmg("a-avatar",0,"-"+atkr.atk);
  }
  selAtk=-1;
  if(s.a.hp<=0){eB(1);return;}
  if(s.p.hp<=0){eB(0);return;}
  uB();
}

function showDmg(board,idx,txt){
  const el=board==="a-avatar"?document.getElementById("a-avatar"):
    document.querySelector("#"+board+" .minion-card[data-idx='"+idx+"']");
  if(!el)return;
  const d=document.createElement("div");
  d.className="hp-float";
  d.style.cssText="position:absolute;font-family:JetBrains Mono,monospace;font-size:1.4rem;font-weight:900;color:"+(txt[0]==="-"? "var(--pink)":"var(--cyan)")+";text-shadow:0 0 10px currentColor;pointer-events:none;z-index:100;left:50%;top:10%;transform:translateX(-50%)";
  d.textContent=txt;
  var pos=el.getBoundingClientRect();
  d.style.left=(pos.left+pos.width/2-15)+"px";
  d.style.top=(pos.top-10)+"px";
  document.body.appendChild(d);
  setTimeout(()=>{d.style.opacity="0";d.style.transform="translateY(-30px)";setTimeout(()=>d.remove(),600);},50);
}

function eT(){
  const s=bt;if(s.end)return;
  selAtk=-1;
  s.p.en=0;
  document.getElementById("end-turn-btn").disabled=1;
  document.getElementById("battle-status").textContent="AI \u56de\u5408...";
  setTimeout(aT,800);
}

function aT(){
  const s=bt;if(s.end)return;
  dw("a");
  s.a.me=Math.min(s.a.me+1,10);
  s.a.en=s.a.me;
  // AI plays cards
  for(let i=0;i<s.a.hd.length;i++){
    const c=s.a.hd[i];
    if(c.cost<=s.a.en&&s.a.bd.length<MB){
      s.a.en-=c.cost;
      c.hp_cur=c.hp||1;c.hp_max=c.hp||1;
      s.a.bd.push(c);
      s.a.hd.splice(i,1);i--;
      lg("AI \u53ec\u5524 "+c.name,"special");
    }
  }
  // AI attacks face
  for(let i=0;i<s.a.bd.length;i++){
    const c=s.a.bd[i];
    if(c.atk>0){
      s.p.hp-=c.atk;
      lg("AI "+c.name+" \u653b\u51fb\u4f60! -"+c.atk,"damage");
      showDmg("p-avatar",0,"-"+c.atk);
    }
  }
  if(s.p.hp<=0){eB(0);return;}
  // Start new turn
  s.t++;
  dw("p");
  s.p.me=Math.min(s.p.me+1,10);
  s.p.en=s.p.me;
  selAtk=-1;
  uB();
  lg("// \u7b2c "+s.t+" \u56de\u5408 \u2014 \u4f60\u7684\u884c\u52a8","");
}

function eB(w){bt.end=1;if(w){document.getElementById("victory-modal").style.display="flex";lg("// \u5bf9\u624b\u9635\u4ea1! \u4f60\u83b7\u80dc!","special");}else{document.getElementById("defeat-modal").style.display="flex";lg("// \u4f60\u7684\u82f1\u96c4\u5012\u4e0b\u4e86...","damage");}}
function resetBattle(){
  document.getElementById("victory-modal").style.display="none";
  document.getElementById("defeat-modal").style.display="none";
  bt=null;selAtk=-1;
  document.getElementById("battle-field").style.display="none";
  document.getElementById("battle-start-screen").style.display="flex";
  document.getElementById("battle-log").innerHTML='<div class="log-entry">// 战斗日志初始化...</div>';
}
setInterval(function(){
const b=document.getElementById('battle-start-btn');
b.disabled=dk.length<5;
if(dk.length<5){b.innerHTML='\u9700\u8981 '+(5-dk.length)+' \u5f20\u5361 (\u5f53\u524d '+dk.length+')';}
else{b.innerHTML='\u5f00\u59cb\u5bf9\u6218<span style="display:block;font-size:.6rem;opacity:.7;margin-top:4px">\u5bf9\u624b: AI \u00b7 \u81ea\u52a8\u5339\u914d \u00b7 \u56de\u5408\u5236</span>';}
},500);

// ===== ENHANCED RENDER WITH ANIMATION =====
function rCAnim(f){
  const g=document.getElementById('collection-grid');
  const fl=f==='all'?C:C.filter(x=>x.type===f);
  const ex=g.querySelectorAll('.card');
  if(ex.length>0){
    ex.forEach(c=>c.classList.add('card-exit'));
    setTimeout(()=>{renderGrid(g,fl);},320);
  }else{renderGrid(g,fl);}
}
function renderGrid(g,fl){
  const st={Common:'★',Rare:'★★',Epic:'★★★',Legendary:'★★★★'};
  g.innerHTML=fl.map((x,i)=>'<div class="card card-enter" data-id="'+x.id+'" data-rarity="'+x.rarity+'" style="animation-delay:'+(i*45)+'ms">'+
    '<span class="card-badge">'+x.rarity.toUpperCase()+'</span>'+
    '<div class="card-art"><div class="card-art-grid"></div><div class="card-holo"></div>'+
    genArt(x,CC[x.rarity])+'</div>'+
    '<div class="card-border-glow"></div>'+
    '<div class="card-body"><div class="card-name">'+x.name+' <span class="cost-badge">⚡'+x.cost+'</span></div>'+
    '<div class="card-type">'+x.type+'</div><div class="card-divider"></div>'+
    '<div class="card-stats">'+
    (x.p>0?'<span class="card-stat"><span class="label">ATK</span> <span class="value pink">'+x.p+'</span></span>':'')+
    (x.d>0?'<span class="card-stat"><span class="label">DEF</span> <span class="value cyan">'+x.d+'</span></span>':'')+
    (x.p===0&&x.d===0?'<span class="card-stat"><span class="label" style="color:var(--purple)">SPL</span></span>':'')+
    '</div><div class="card-desc">'+x.desc+'</div>'+
    '<div class="card-rarity">'+st[x.rarity]+'</div></div></div>').join('');
  g.querySelectorAll('.card').forEach(e=>{sFX(e);dDrag(e);});
}
// ===== DRAG AND DROP =====
let dId=null,dSrc=null;
function dDrag(el){
  el.draggable=true;
  el.addEventListener('dragstart',function(e){
    dId=parseInt(this.dataset.id);dSrc='coll';
    this.classList.add('dragging');
    const gh=this.cloneNode(true);gh.className='card';gh.style.cssText='position:fixed;pointer-events:none;z-index:9999;width:140px;opacity:.85;transform:rotate(-2deg);box-shadow:0 0 30px rgba(0,240,255,.5)';
    document.body.appendChild(gh);e.dataTransfer.setDragImage(gh,70,140);
    setTimeout(()=>gh.remove(),0);
  });
  el.addEventListener('dragend',function(){this.classList.remove('dragging');document.querySelectorAll('.card.drag-target').forEach(c=>c.classList.remove('drag-target'));});
  el.addEventListener('dragover',function(e){e.preventDefault();if(parseInt(this.dataset.id)!==dId)this.classList.add('drag-target');});
  el.addEventListener('dragleave',function(){this.classList.remove('drag-target');});
  el.addEventListener('drop',function(e){
    e.preventDefault();this.classList.remove('drag-target');
    const p=this.parentElement;
    const cards=[...p.querySelectorAll('.card[data-id]')];
    const fi=cards.findIndex(c=>parseInt(c.dataset.id)===dId);
    const ti=cards.findIndex(c=>parseInt(c.dataset.id)===parseInt(this.dataset.id));
    if(fi===-1||ti===-1)return;
    const f=document.querySelector('.filter-btn.active')?.dataset?.filter||'all';
    const vc=f==='all'?C:C.filter(x=>x.type===f);
    const fv=vc.findIndex(x=>x.id===dId);
    const tv=vc.findIndex(x=>x.id===parseInt(this.dataset.id));
    if(fv===-1||tv===-1)return;
    const[m]=vc.splice(fv,1);vc.splice(tv,0,m);
    const rm=C.filter(x=>!vc.includes(x));
    const nw=[...vc,...rm];
    C.length=0;C.push(...nw);
    rCAnim(f);
  });
}
// Override filter
document.getElementById('filters').addEventListener('click',function(e){
  if(!e.target.classList.contains('filter-btn'))return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');rCAnim(e.target.dataset.filter);
});
// Drag hint
(function(){const h=document.createElement('div');h.style.cssText='text-align:center;font-family:JetBrains Mono,monospace;font-size:.6rem;color:var(--text-dim);padding:2px 0 8px;opacity:.6';
h.textContent='// 拖拽卡牌可重新排序';
document.querySelector('#view-collection .collection-header').after(h);})();


function genArt(c,cl){
  var id=c.id,w=200,h=280;
  function g(e,s){return `<g filter="url(g${id})" opacity=".${s}">${e}</g>`;}
  function circ(cx,cy,r,f){return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${f}" stroke="${cl}" stroke-width=".8"/>`;}
  function poly(pts,f){return `<polygon points="${pts}" fill="${f}" stroke="${cl}" stroke-width=".8"/>`;}
  function dots(n,cx,cy,r,sz){var d="";for(var i=0;i<n;i++){var a=(i/n)*Math.PI*2,t=cx+Math.cos(a)*r,s=cy+Math.sin(a)*r;d+=circ(t,s,sz,cl);}return g(d,4);}
  function gc(cx,cy,r){return g(circ(cx,cy,r,cl),5)+circ(cx,cy,r,"transparent");}
  var bg=`<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">`+
    `<defs><filter id="g${id}"><feGaussianBlur stdDeviation="3"/></filter>`+
    `<linearGradient id="bg${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${cl}22"/><stop offset="100%" stop-color="#00000044"/></linearGradient>`+
    `<radialGradient id="cg${id}"><stop offset="0%" stop-color="${cl}44"/><stop offset="100%" stop-color="${cl}00"/></radialGradient></defs>`+
    `<rect width="200" height="280" fill="#0a0a14"/><rect width="200" height="280" fill="url(#bg${id})"/>`+
    `<rect width="200" height="280" fill="none" stroke="${cl}" stroke-width=".3" opacity=".15" stroke-dasharray="8,8"/>`+
    `<circle cx="100" cy="140" r="90" fill="url(#cg${id})"/>`;
  var art=gc(100,130,55);
  if(id===1)art+=g(poly("100,55 148,80 148,130 148,180 100,205 52,180 52,130 52,80",cl+"55"),6)+poly("100,65 140,85 140,130 140,175 100,195 60,175 60,130 60,85","transparent")+g(circ(100,130,20,cl+"44"),5);
  else if(id===2)art+=g(`<path d="M60,180 Q80,90 100,100 Q120,110 110,70 Q100,30 130,60" fill="none" stroke="${cl}" stroke-width="3" stroke-linecap="round"/>`,6)+circ(120,65,6,cl+"66")+g(dots(5,100,120,40,2),4);
  else if(id===3)art+=gc(100,120,40)+g(poly("60,140 80,90 100,120 120,90 140,140",cl+"55"),6)+poly("65,145 80,100 100,125 120,100 135,145","transparent")+g(circ(100,110,8,cl+"77"),5);
  else if(id===4)art+=gc(100,130,30)+g(poly("85,60 100,70 115,60 120,100 115,140 100,150 85,140 80,100",cl+"55"),6)+poly("88,70 100,78 112,70 115,100 112,130 100,138 88,130 85,100","transparent")+g(dots(8,100,130,35,1.5),4);
  else if(id===5)art+=gc(100,130,30)+g(`<path d="M50,160 Q70,90 90,120 Q110,150 130,90 Q150,30 170,80" fill="none" stroke="${cl}" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6,4"/>`,6)+circ(175,85,5,cl+"66")+g(dots(6,100,110,30,1.5),4);
  else if(id===6)art+=gc(100,120,35)+g(circ(100,120,25,cl+"55"),6)+circ(100,120,20,"transparent")+g(`<path d="M95,95 L105,95 L105,100 L100,105 L95,100 Z" fill="${cl}88"/>`,5)+g(dots(12,100,120,40,1),4);
  else if(id===7)art+=gc(100,115,25)+g(poly("95,60 105,60 105,100 115,110 115,125 85,125 85,110 95,100",cl+"55"),6)+poly("97,65 103,65 103,100 110,110 110,120 90,120 90,110 97,100","transparent")+g(`<path d="M70,125 Q100,80 130,125" fill="none" stroke="${cl}" stroke-width="1.5"/>`,4)+g(`<path d="M55,140 Q100,60 145,140" fill="none" stroke="${cl}" stroke-width="1"/>`,4);
  else if(id===8)art+=gc(100,130,40)+g(`<ellipse cx="100" cy="130" rx="35" ry="45" fill="${cl}33" stroke="${cl}" stroke-width="1.5"/>`,5)+g(`<path d="M75,115 Q90,95 100,115 Q110,95 125,115" fill="none" stroke="${cl}" stroke-width="2"/>`,4)+g(dots(6,100,115,25,2),4);
  else if(id===9)art+=gc(100,120,35)+g(`<path d="M65,110 Q80,90 100,100 Q120,90 135,110 Q140,130 120,140 Q100,145 80,140 Q60,130 65,110 Z" fill="${cl}44" stroke="${cl}" stroke-width="1.5"/>`,6)+g(`<path d="M80,115 L90,125 L100,110 L110,125 L120,115" fill="none" stroke="${cl}" stroke-width="1.5"/>`,4)+g(dots(6,100,120,30,1.5),4);
  else if(id===10)art+=gc(100,130,40)+g(poly("100,50 130,90 120,140 80,140 70,90",cl+"55"),6)+poly("100,65 120,95 112,130 88,130 80,95","transparent")+g(poly("100,70 110,95 105,120 95,120 90,95",cl+"44"),5)+g(dots(5,100,120,35,2),4);
  else if(id===11)art+=gc(100,120,30)+g(circ(100,120,35,cl+"33"),5)+circ(100,120,30,"transparent")+g(`<path d="M100,80 L100,160 M60,120 L140,120" stroke="${cl}" stroke-width="1.5"/>`,4)+g(circ(100,120,15,cl+"55"),5);
  else if(id===12)art+=gc(100,120,30)+g(`<path d="M70,90 Q100,70 130,90 Q150,120 130,150 Q100,170 70,150 Q50,120 70,90 Z" fill="${cl}44" stroke="${cl}" stroke-width="1.5"/>`,6)+g(`<path d="M100,120 L60,80 M100,120 L140,80 M100,120 L60,160 M100,120 L140,160" stroke="${cl}" stroke-width="1"/>`,4)+circ(100,120,6,cl+"77");
  else if(id===13)art+=gc(100,125,35)+g(`<path d="M80,85 Q100,70 120,85 Q130,110 120,140 Q100,155 80,140 Q70,110 80,85 Z" fill="${cl}44" stroke="${cl}" stroke-width="1.5" stroke-dasharray="4,4"/>`,6)+g(circ(88,108,4,cl+"77"),5)+g(circ(112,108,4,cl+"77"),5)+g(`<path d="M90,125 L110,125" stroke="${cl}" stroke-width="1.5"/>`,4);
  else if(id===14)art+=gc(100,120,35)+g(circ(100,120,28,cl+"44"),6)+circ(100,120,23,"transparent")+g(circ(100,120,10,cl+"66"),5)+g(`<path d="M100,90 Q120,100 120,120 Q120,140 100,150 Q80,140 80,120 Q80,100 100,90 Z" fill="none" stroke="${cl}" stroke-width="1.5"/>`,4);
  else if(id===15)art+=gc(100,130,40)+g(poly("70,80 100,60 130,80 140,110 130,140 100,160 70,140 60,110",cl+"44"),6)+poly("75,90 100,75 125,90 130,110 125,130 100,145 75,130 70,110","transparent")+g(`<path d="M100,60 L100,160 M70,80 L130,80 M60,110 L140,110" stroke="${cl}" stroke-width=".8"/>`,4);
  else if(id===16)art+=gc(100,120,45)+g(`<path d="M100,70 Q130,100 120,140 Q100,160 80,140 Q70,100 100,70 Z" fill="${cl}55" stroke="${cl}" stroke-width="2"/>`,6)+g(`<path d="M100,90 Q115,110 110,130 Q100,140 90,130 Q85,110 100,90 Z" fill="${cl}77" stroke="${cl}" stroke-width="1"/>`,5)+g(dots(8,100,120,50,1.5),4);
  return bg+art+"</svg>";
}
